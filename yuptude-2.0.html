<div id="yptd">
	<div id="yptd-bar">
		<button id="yptd-off"><em>Off</em></button>
		<div id="yptd-controls">
			<button id="yptd-dwn" aria-label="minus">-</button>
			<div id="yptd-box" aria-live="polite">
				<input id="yptd-in" type="text" aria-label="Speed" class="">
			</div>
			<button id="yptd-up">+</button>
		</div>
	</div>
	<div id="yptd-bottom">
		<a id="yptd-lnk" href="http://yuptude.com"><em>yuptude</em></a>
		<div id="yptd-pit">
			<label for="yptd-pin">Shift Pitch <em id="yptd-brwsws">(Firefox &amp; Safari only)</em></label>
			<input id="yptd-pin" type="checkbox">
		</div>
	</div>
</div>
